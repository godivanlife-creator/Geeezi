<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍊子 (Geezi) 的專屬網頁</title>
    <style>
        :root {
            --main-orange: #FF8C00;
            --bg-color: #FFF9F2;
            --btn-sms: #007aff;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background: white;
            width: 85%;
            max-width: 380px;
            padding: 40px 20px;
            border-radius: 40px;
            box-shadow: 0 15px 35px rgba(255, 140, 0, 0.1);
            text-align: center;
            animation: slideUp 0.8s ease-out;
        }

        /* 圖片區塊優化：確保 GitHub 照片完美呈現 */
        .profile-img {
            width: 160px;
            height: 160px;
            background: #fff;
            margin: 0 auto 20px;
            display: block;
            border-radius: 50%;
            border: 5px solid white;
            box-shadow: 0 8px 20px rgba(255, 140, 0, 0.2);
            object-fit: cover; /* 關鍵：確保照片不變形 */
            animation: floating 3s ease-in-out infinite;
        }

        h1 {
            color: var(--main-orange);
            font-size: 28px;
            margin: 10px 0;
        }

        .status-msg {
            font-size: 18px;
            color: #d32f2f;
            font-weight: bold;
            margin: 20px 0;
            line-height: 1.5;
        }

        .info-box {
            background: #fdfdfd;
            border: 1.5px solid #eee;
            border-radius: 20px;
            padding: 15px;
            margin: 20px 0;
            text-align: left; /* 改為左對齊更有層次 */
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            margin: 12px 0;
            border-radius: 35px;
            text-decoration: none;
            font-weight: bold;
            transition: all 0.3s;
            border: none;
            cursor: pointer;
            width: 100%;
            font-size: 18px;
            box-sizing: border-box;
            gap: 8px;
        }

        .btn-sms {
            background: var(--btn-sms);
            color: white;
            box-shadow: 0 6px 15px rgba(0, 122, 255, 0.3);
        }

        .btn-call {
            background: #4CAF50;
            color: white;
            box-shadow: 0 6px 15px rgba(76, 175, 80, 0.3);
        }

        .btn-ig {
            background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
            color: white;
        }

        .btn:active { transform: scale(0.95); }

        .loading {
            display: none;
            margin-top: 10px;
            font-size: 14px;
            color: var(--main-orange);
            font-weight: bold;
        }

        @keyframes floating {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-12px); }
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="container">
    <img src="https://raw.githubusercontent.com/godivanlife-creator/Geeezi/main/B7454992-0196-4198-842D-6F74D9F02506.jpg" alt="橘子 Geezi" class="profile-img">
    
    <h1>我是🍊子 (Geezi)</h1>

    <div class="status-msg">
        📍 我不小心迷路了...<br>請幫我通報位置 🥺
    </div>

    <div class="info-box">
        ✨ <strong>特性：</strong>愛吃、愛搗蛋、熱情好動<br>
        🏠 <strong>居住地：</strong>高雄橋頭
    </div>

    <button class="btn btn-sms" onclick="sendSMSLocation()">📍 簡訊通報我的位置</button>
    <div id="loadingText" class="loading">正在精確定位中...請稍候</div>

    <a href="tel:0925508817" class="btn btn-call">📞 撥打給我的家人</a>
    
    <a href="https://www.instagram.com/jrt.geezi?igsh=MTBreWw5bThtemJraQ==" target="_blank" class="btn btn-ig">📸 橘子的 IG 日常</a>
    
    <div style="margin-top: 30px; font-size: 11px; color: #bbb; letter-spacing: 1px;">
        POWERED BY GODIVANLIFE
    </div>
</div>

<script>
    function sendSMSLocation() {
        const loading = document.getElementById('loadingText');
        loading.style.display = 'block';

        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition((position) => {
                const lat = position.coords.latitude;
                const lng = position.coords.longitude;
                
                // 產生高精度 Google 地圖網址
                const mapUrl = "https://www.google.com/maps?q=$0" + lat + "," + lng;
                
                const phoneNumber = "0925508817";
                const message = encodeURIComponent("【橘子尋寵通報】我發現了橘子 Geezi！目前位置：" + mapUrl);
                
                window.location.href = "sms:" + phoneNumber + "?body=" + message;
                loading.style.display = 'none';
            }, (error) => {
                loading.style.display = 'none';
                alert("無法取得精確定位，將直接開啟簡訊。");
                window.location.href = "sms:0925508817?body=" + encodeURIComponent("【橘子尋寵通報】我發現了橘子 Geezi，請與我聯繫。");
            }, { 
                enableHighAccuracy: true, 
                timeout: 8000, 
                maximumAge: 0 
            });
        } else {
            alert("您的裝置不支援定位功能。");
            loading.style.display = 'none';
        }
    }
</script>

</body>
</html>
